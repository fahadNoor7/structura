spring.application.name=structura
server.port=8080

# Vaadin
vaadin.launch-browser=true
vaadin.allowed-packages=com.vaadin,org.vaadin,com.wsd.structura

# Anthropic
anthropic.api-key=${ANTHROPIC_API_KEY:changeme}
anthropic.model=claude-haiku-4-5-20251001
anthropic.api-url=https://api.anthropic.com/v1/messages
anthropic.anthropic-version=2023-06-01
anthropic.max-tokens=1024
anthropic.timeout-seconds=30

# Long-running AI requests
spring.mvc.async.request-timeout=60s

logging.level.com.wsd.structura=DEBUG
